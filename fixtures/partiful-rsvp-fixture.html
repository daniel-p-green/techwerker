<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Techwerker Partiful RSVP Fixture</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 32px;
        color: #181818;
        background: #f7f4ef;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
      }

      .event-card,
      .modal {
        border: 1px solid #d8d1c7;
        background: #fff;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 18px;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 10px 14px;
        background: #171717;
        color: #fff;
        font-weight: 700;
      }

      label {
        display: block;
        margin: 12px 0;
        font-weight: 650;
      }

      input,
      textarea {
        box-sizing: border-box;
        display: block;
        width: 100%;
        margin-top: 6px;
        padding: 10px;
        border: 1px solid #bbb;
        border-radius: 6px;
        font: inherit;
      }

      .status {
        margin-top: 12px;
        font-size: 14px;
        color: #5f4a1f;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="event-card" data-event-url="https://partiful.com/e/demo-rsvp-fixture">
        <h1>AI Builders Mixer #NYTechWeek</h1>
        <p>Official fixture for duplicate CTA and modal-filling smoke tests.</p>
        <button type="button">Get on the list</button>
      </section>

      <section class="event-card" aria-hidden="true">
        <h2>Background Candidate</h2>
        <p>This inactive card intentionally repeats the CTA label.</p>
        <button type="button">Get on the list</button>
      </section>

      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="rsvp-title" data-active-rsvp-modal="true">
        <h2 id="rsvp-title">Get on the list</h2>
        <form data-state="needs-user-answer">
          <label>
            Full name
            <input name="full_name" autocomplete="name" value="Demo Attendee">
          </label>
          <label>
            Email
            <input name="email" autocomplete="email" value="demo@example.com">
          </label>
          <label>
            What are you building? <span aria-label="required">*</span>
            <textarea name="building" required></textarea>
          </label>
          <label>
            Why do you want to attend?
            <textarea name="motivation"></textarea>
          </label>
          <button type="button" data-authorized-action="continue">Continue</button>
          <p class="status" data-final-state="needs-user-answer">Stop here until the required factual answer is known.</p>
        </form>
      </section>
    </main>
  </body>
</html>
